seed: 42
device: cuda
dataset:
  preset: fineweb_edu_code_agentic_mix
  name: HuggingFaceFW/fineweb-edu
  config: sample-10BT
  text_column: text
  split_train: train
  split_val: train
  textmix:
    fineweb_edu: 0.70
    code: 0.20
    agentic: 0.10
tokenizer:
  vocab_size: 8192
  lowercase: true
  min_frequency: 2
  max_word_length: 64
  max_token_length: 256
model:
  vocab_size: 8192
  word_vocab_size: 8192
  max_position_embeddings: 256
  d_model: 1536
  n_heads: 24
  n_layers: 16
  mlp_ratio: 4
  dropout: 0.1
  composition_hidden_dim: 3072
  composition_attention: true
  pad_token_id: 0
  use_ternary: true
training:
  output_dir: checkpoints/phase6
  epochs: 1
  learning_rate: 1.5e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  batch_size: 8
  eval_batch_size: 8
  grad_accum_steps: 1
  warmup_steps: 100
  max_steps: 50000
  eval_interval: 1000
  log_interval: 50
  save_interval: 1000
  num_workers: 0
  max_train_samples: 20000
  max_eval_samples: 2048
  use_wandb: false
  project: tritmorph-llm
  run_name: phase6-hybrid-scale
  model_type: tritmorph
  compile: false
